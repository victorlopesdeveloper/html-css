<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tags HTML</title>
</head>
<body>
    <h1>Tags em HTML</h1>
    <p>Em HTML5, podemos inserir elementos da lista a seguir. Passe o mouse sobre os termos para descobrir qual tag deverá utilizar em cada caso.</p>
    <ul>
        <li title="Use a tag &lt p &gt">Parágrafo</li>
        <li title="Usa a tag &lt h1 &gt">Títulos</li>
        <li title="Usa a tag &lt img &gt">Imagens</li>
        <li title="Usa a tag &lt abbr &gt">Abreviações</li>
        <li title="Usa a tag &lt code &gt">Codigos-fonte</li>
        <li title="Usa a tag &lt ol &gt">Listas Numeradas</li>
        <li title="Usa a tag &lt ul &gt">Listas com Demarcadores</li>
    </ul>
</body>
</html>
