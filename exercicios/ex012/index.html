<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vídeos com HTML5 </title>
</head>
<body>
    <h1>Inserindo vídeos hospedados localmente</h1>
    <p>Este vídeo está hospedado no meu própio servidor.</p>
    <video width="560" poster="/midia/imagem-poster.png" controls>
        <source src="/midia/Meu-Video.mp4" type="video/mp4">
        <source src="/midia/Meu-Video.webm" type="video/webm">
        <p>Infelizmente seu navegador não consegue carregar o vídeo.</p>
    </video>
    <h1>Incorporação de vídeos externos</h1>
    <h2>Video do youtube</h2>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/GQYVu94I998?si=GbR0U3DRj6MKZzQ9" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
<h2>Video do vimeo</h2>
    <iframe title="vimeo-player" src="https://player.vimeo.com/video/126287950?h=c655f0ff29" width="560" height="360" frameborder="0" referrerpolicy="strict-origin-when-cross-origin" allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share"   allowfullscreen></iframe>
    
</body>
</html>
