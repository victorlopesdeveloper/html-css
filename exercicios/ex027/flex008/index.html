<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexible Box</title>
    <style>
        div.container{
            background-color: lightsalmon;
            display: flex;
            flex-flow: row wrap;
            justify-content: space-evenly;
            align-items: flex-start;
            height: 800px;


        }
        div.item{
            background-color: lightblue;
            border: 1px solid black;
            text-align: center;
            padding: 60px;
            

            
        }
        div#item1{
            align-self: auto;
        }
        div#item2{
            align-self: flex-start;
        }
        div#item3{
            align-self: center;
        }   
        div#item4{
            align-self: flex-end;
        }
        div#item5{
            align-self: stretch;
        }
        div#item6{
            align-self: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item" id="item1">A</div>
        <div class="item" id="item2">B</div>
        <div class="item" id="item3">C</div>
        <div class="item" id="item4">D</div>
        <div class="item" id="item5">E</div>
        <div class="item" id="item6">F</div>
        
        
        
        
    </div>
</body>
</html>
