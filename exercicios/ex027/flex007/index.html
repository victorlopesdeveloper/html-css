<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexible Box</title>
    <style>
        div.container{
            background-color: lightsalmon;
            display: flex;
            flex-flow: row wrap;
            justify-content: space-evenly;


        }
        div.item{
            background-color: lightblue;
            border: 1px solid black;
            text-align: center;
            padding: 60px;
            

            
        }
        div#item1{
            order: 0;
        }
        div#item2{
            order: -1;
        }
        div#item3{
            order: -2;
        }
        div#item4{
            order: -3;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item" id="item1">A</div>
        <div class="item" id="item2">B</div>
        <div class="item" id="item3">C</div>
        <div class="item" id="item4">D</div>
        
        
        
    </div>
</body>
</html>
