<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grouping Tags</title>
     <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: darkgray;
            margin: 0;
        }
        header{
           background-color: white;
           padding: 10px;
           margin: 10px;
           border-radius: 5px;
           box-shadow: 3px 3px 5px rgba(0, 0, 0, 0.363);
        }
        h1{
            text-align: center;
        }
        nav{
            background-color: rgb(109, 109, 109);
            padding: 3px;
            /*o inset e usado para a sombra ficar para dentro e sem usar o inset a sobra fica para fora*/
            box-shadow: inset 1px 2px 3px rgba(0, 0, 0, 0.541);
            border-radius: 5px;
            
        }
        nav > a{
            text-decoration: none;
            color: white;
            font-weight: bold;
            margin-right: 20px;

        }

        nav > a:hover{
            text-decoration: underline;
        }

        main{
            background-color: white;
            padding: 20px 10px;
            margin: 10px;
            border-radius: 5px;
            box-shadow: 3px 3px 5px rgba(0, 0, 0, 0.363);
        }
        #assuntos{
            text-align: center;
        }
        article{
            background-color: lightgray;
            padding: 5px;
            border-radius: 5px;
        }
        article > h2{
            text-align: center;
        }
        article > aside{
            background-color: rgb(161, 161, 161);
            border-radius: 5px;
            
        }
        article > aside > p {
            padding: 4px;
        }
        footer{
            background-color: black;
            color: white;
            text-align: center;
            padding: 4px;
            margin: 0px;
            border-radius: 5px;
            box-shadow: 3px 3px 5px rgba(0, 0, 0, 0.363);
        }
        footer > p {
            margin: 0;
            
        }
        div#bola{
            height: 100px;
            width: 100px;
            margin: 10px;
            background-color: white;
            border-radius: 50%;
        }
     </style>
</head>
<body>
    <header>
        <!--Cabeçalho-->
        <h1>Meu Site</h1>
        <nav>
            <a href="#">Link</a>
            <a href="#">Link</a>
            <a href="#">Link</a>
            <a href="#">Link</a>
            <a href="#">Link</a>
        </nav>
    </header>
    <main>
        <!--Conteudo principal-->
        <section id="assuntos">
            <p>Esportes Política Tecnologia</p>
        </section>
        <section id="noticias">
            <article>
                <h2>Artigo sobre o Brasil</h2>
                <p>Lorem ipsum, dolor sit amet consectetur adipisicing elit. Quae inventore id eaque, et quibusdam voluptatem commodi rem non. Dolores, velit!</p>
                <aside>
                    <p>Artigo escrito por José da Silva</p>
                </aside>
            </article>
            
        </section>
        

    </main>
    <footer>
        <!--Rodapé-->
        <p>Desenvolvido por Victor Lopes</p>
    </footer>
    <div id="bola"></div>
</body>
</html>
