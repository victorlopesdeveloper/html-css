<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulários</title>
     <style>
        *{
            font-family: Arial, Helvetica, sans-serif;
        }
        fieldset{
            margin-bottom: 10px;
        }
        input{
            margin-bottom: 10px;
        }
        
     </style>
</head>
<body>
    <h1>Teste de Formulário</h1>
    <form action="cadastro.php" method="get" autocomplete="on">
        <fieldset>
            <legend>Dados Pessoais</legend>
            <div>
                <label for="inome">Nome</label>
                <input type="text" name="nome" id="inome" required minlength="5" maxlength="20">
            </div>
            <div>
                <label for="iemail">E-mail</label>
                <input type="email" name="email" id="iemail" autocomplete="email" placeholder="exemplo@email.com" required>
            </div>
            <div>
                <label for="itel">Telefone</label>
                <input type="tel" name="tel" id="itel" autocomplete="tel" pattern="^\d(\d{2}\)\d{4,5}-{4}$" required placeholder="(xx)xxxx-xxxx">
            </div>
        </fieldset>
        <!--Estudar mais sobre RegEx-->
        <div>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </div>
    </form>

    
</body>
</html>
