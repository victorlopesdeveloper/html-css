<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias em HTML</title>
</head>
<body>
    <h1>Imagens Dinâmicas</h1>
    <p>Tente abrir esse site em vários dispositivos diferentes ou simplismente aumente e dimnua o tamanho do seu navegador.</p>
    
    <picture>
        <source media="(max-width: 750px)" srcset="imagens/foto-p.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="imagens/foto-m.png" type="image/png">
        <img src="/imagens/foto-g.png" alt="imagem flexível">
    </picture>
    <h1>Reproduzindo áudio</h1>
    <p>Vamos aprender a reproduzir áudios em HTML5</p>
    <audio preload="metadata" controls>
       <source src="/midia/guanacast-33.mp3" type="audio/mpeg"> 
       <source src="/midia/guanacast-33.ogg" type="audio/ogg">
       <source src="midia/guanacast-33.wav" type="audio/wav"> <!--Não use o wav pois o arquivo e pesadíssimo e vai trazer uma pessima experiência para o usuário-->
       <p>Seu navegador não suporta audio <a href="/midia/guanacast-33.mp3" download="guanacast-33" type="audio/mpeg">Clique aqui para baixar o arquivo MP3</a></p>
    </audio>
    
</body>
</html>
